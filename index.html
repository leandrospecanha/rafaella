<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roda da Vida</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2937;
    }

    .page {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }

    .subtitulo {
      margin: 0 0 16px;
      text-align: center;
      color: #4b5563;
      font-size: 15px;
      line-height: 1.4;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      padding: 12px;
    }

    .radar-wrap {
      width: 100%;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      background: #fff;
      border-radius: 12px;
    }

    .grid {
      fill: none;
      stroke: #d1d5db;
      stroke-width: 1;
    }

    .axis {
      stroke: #c4cbd4;
      stroke-width: 1;
    }

    .area {
      fill: rgba(11, 107, 107, 0.18);
      stroke: #0b6b6b;
      stroke-width: 3;
    }

    .point {
      fill: #0b6b6b;
      stroke: #ffffff;
      stroke-width: 2.5;
      cursor: pointer;
    }

    .label {
      font-size: 12px;
      fill: #374151;
      text-anchor: middle;
      font-weight: 600;
    }

    .value-label {
      font-size: 11px;
      fill: #6b7280;
      text-anchor: middle;
      font-weight: 600;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      background: #0b6b6b;
      color: white;
      cursor: pointer;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      .page {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .subtitulo {
        font-size: 14px;
      }

      .card {
        padding: 8px;
        border-radius: 12px;
      }

      .label {
        font-size: 10px;
      }

      .value-label {
        font-size: 9px;
      }

      button {
        width: 100%;
        max-width: 320px;
      }

      .hint {
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      .label {
        font-size: 9px;
      }

      .value-label {
        font-size: 8px;
      }

      .subtitulo {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Roda da Vida</h1>
    <p class="subtitulo">
      Toque em qualquer área do gráfico para definir a nota do eixo mais próximo.
    </p>

    <div class="card">
      <div class="radar-wrap">
        <svg id="radar" viewBox="0 0 820 820" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <div class="controls">
        <button id="resetBtn">Resetar tudo para 10</button>
      </div>

      <div class="hint">
        No celular, toque próximo do eixo desejado. Quanto mais longe do centro, maior a nota.
      </div>
    </div>
  </div>

  <script>
    const labels = [
      "Desenvolvimento Intelectual",
      "Saúde e Energia",
      "Equilíbrio Emocional",
      "Recursos Financeiros",
      "Contribuição Social",
      "Realização e Propósito",
      "Hobbies e Diversão",
      "Plenitude e Felicidade",
      "Espiritualidade",
      "Vida Social",
      "Relacionamento Amoroso",
      "Família"
    ];

    let values = new Array(labels.length).fill(10);

    const svg = document.getElementById("radar");
    const resetBtn = document.getElementById("resetBtn");

    const cx = 410;
    const cy = 410;
    const maxRadius = 255;
    const levels = 10;
    const totalAxes = labels.length;
    const startAngle = -Math.PI / 2;

    function polarToCartesian(angle, radius) {
      return {
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getAxisAngle(index) {
      return startAngle + (2 * Math.PI * index / totalAxes);
    }

    function normalizeAngle(angle) {
      while (angle < -Math.PI) angle += 2 * Math.PI;
      while (angle > Math.PI) angle -= 2 * Math.PI;
      return angle;
    }

    function getNearestAxisIndex(clickAngle) {
      let nearestIndex = 0;
      let smallestDiff = Infinity;

      for (let i = 0; i < totalAxes; i++) {
        const axisAngle = getAxisAngle(i);
        const diff = Math.abs(normalizeAngle(clickAngle - axisAngle));

        if (diff < smallestDiff) {
          smallestDiff = diff;
          nearestIndex = i;
        }
      }

      return nearestIndex;
    }

    function buildPolygonPoints() {
      return values.map((value, i) => {
        const angle = getAxisAngle(i);
        const radius = (value / 10) * maxRadius;
        const p = polarToCartesian(angle, radius);
        return `${p.x},${p.y}`;
      }).join(" ");
    }

    function createSvgElement(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function splitLabel(text) {
      const words = text.split(" ");
      if (words.length <= 2) return [text];

      const middle = Math.ceil(words.length / 2);
      return [
        words.slice(0, middle).join(" "),
        words.slice(middle).join(" ")
      ];
    }

    function drawRadar() {
      svg.innerHTML = "";

      for (let level = 1; level <= levels; level++) {
        const radius = (level / levels) * maxRadius;
        const ringPoints = [];

        for (let i = 0; i < totalAxes; i++) {
          const angle = getAxisAngle(i);
          const p = polarToCartesian(angle, radius);
          ringPoints.push(`${p.x},${p.y}`);
        }

        svg.appendChild(createSvgElement("polygon", {
          points: ringPoints.join(" "),
          class: "grid"
        }));
      }

      for (let level = 1; level <= levels; level++) {
        const radius = (level / levels) * maxRadius;
        svg.appendChild(createSvgElement("text", {
          x: cx + 14,
          y: cy - radius + 4,
          class: "value-label"
        })).textContent = level;
      }

      for (let i = 0; i < totalAxes; i++) {
        const angle = getAxisAngle(i);
        const end = polarToCartesian(angle, maxRadius);

        svg.appendChild(createSvgElement("line", {
          x1: cx,
          y1: cy,
          x2: end.x,
          y2: end.y,
          class: "axis"
        }));

        const labelPos = polarToCartesian(angle, maxRadius + 58);
        const lines = splitLabel(labels[i]);

        const textEl = createSvgElement("text", {
          x: labelPos.x,
          y: labelPos.y,
          class: "label"
        });

        lines.forEach((line, idx) => {
          const tspan = createSvgElement("tspan", {
            x: labelPos.x,
            dy: idx === 0 ? "0" : "13"
          });
          tspan.textContent = line;
          textEl.appendChild(tspan);
        });

        svg.appendChild(textEl);
      }

      svg.appendChild(createSvgElement("polygon", {
        points: buildPolygonPoints(),
        class: "area"
      }));

      for (let i = 0; i < totalAxes; i++) {
        const angle = getAxisAngle(i);
        const radius = (values[i] / 10) * maxRadius;
        const p = polarToCartesian(angle, radius);

        svg.appendChild(createSvgElement("circle", {
          cx: p.x,
          cy: p.y,
          r: 8,
          class: "point"
        }));

        const valueText = createSvgElement("text", {
          x: p.x,
          y: p.y - 12,
          class: "value-label"
        });
        valueText.textContent = values[i];
        svg.appendChild(valueText);
      }

      svg.appendChild(createSvgElement("circle", {
        cx: cx,
        cy: cy,
        r: 3,
        fill: "#6b7280"
      }));
    }

    function getSvgPointFromEvent(event) {
      const rect = svg.getBoundingClientRect();

      let clientX, clientY;

      if (event.touches && event.touches.length > 0) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      const scaleX = 820 / rect.width;
      const scaleY = 820 / rect.height;

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function updateByPointer(event) {
      const point = getSvgPointFromEvent(event);
      const dx = point.x - cx;
      const dy = point.y - cy;

      const rawAngle = Math.atan2(dy, dx);
      const distance = Math.sqrt(dx * dx + dy * dy);

      const axisIndex = getNearestAxisIndex(rawAngle);
      const normalizedValue = clamp(Math.round((distance / maxRadius) * 10), 0, 10);

      values[axisIndex] = normalizedValue;
      drawRadar();
    }

    svg.addEventListener("click", updateByPointer);

    svg.addEventListener("touchstart", (event) => {
      event.preventDefault();
      updateByPointer(event);
    }, { passive: false });

    resetBtn.addEventListener("click", () => {
      values = new Array(labels.length).fill(10);
      drawRadar();
    });

    drawRadar();
  </script>
</body>
</html>
