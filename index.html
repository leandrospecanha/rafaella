<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roda da Vida</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7f8;
color:#1f2937;
}

.page{
max-width:920px;
margin:auto;
padding:10px;
}

h1{
text-align:center;
font-size:28px;
margin:0 0 6px;
}

.subtitulo{
text-align:center;
margin:0 0 12px;
color:#555;
font-size:16px;
}

.card{
background:white;
border-radius:16px;
padding:10px;
box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

svg{
width:100%;
height:auto;
display:block;
touch-action:none;
}

.grid{
fill:none;
stroke:#d1d5db;
stroke-width:1.2;
}

.axis{
stroke:#c4cbd4;
stroke-width:1.2;
}

.area{
fill:rgba(11,107,107,0.16);
stroke:#0b6b6b;
stroke-width:3;
}

.point{
fill:#0b6b6b;
stroke:white;
stroke-width:3;
}

.label{
font-size:18px;
font-weight:700;
fill:#2f3a45;
}

.value-badge{
fill:#ffffff;
stroke:#0b6b6b;
stroke-width:2;
}

.value-text{
font-size:16px;
text-anchor:middle;
dominant-baseline:middle;
fill:#0b6b6b;
font-weight:800;
}

.controls{
text-align:center;
margin-top:16px;
}

button{
background:#0b6b6b;
border:none;
color:white;
padding:12px 18px;
border-radius:10px;
font-size:16px;
width:100%;
max-width:420px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="page">

<h1>Roda da Vida</h1>
<p class="subtitulo">Toque no gráfico ou arraste a bolinha para ajustar a nota</p>

<div class="card">

<svg id="radar" viewBox="0 0 1000 1000"></svg>

<div class="controls">
<button id="resetBtn">Resetar tudo para 10</button>
</div>

</div>
</div>

<script>

const labels=[
"Intelectual",
"Saúde",
"Emocional",
"Finanças",
"Contribuição Social",
"Plenitude",
"Espiritualidade",
"Vida Social",
"Amoroso",
"Família"
];

let values=new Array(labels.length).fill(10);

const svg=document.getElementById("radar");
const resetBtn=document.getElementById("resetBtn");

const cx=500;
const cy=500;
const maxRadius=340;
const levels=10;
const totalAxes=labels.length;
const startAngle=-Math.PI/2;

let draggingAxisIndex=null;
let activePointerId=null;

function polarToCartesian(angle,radius){
return{
x:cx+Math.cos(angle)*radius,
y:cy+Math.sin(angle)*radius
};
}

function clamp(v,min,max){
return Math.max(min,Math.min(max,v));
}

function getAxisAngle(i){
return startAngle+(2*Math.PI*i/totalAxes);
}

function normalizeAngle(a){
while(a<-Math.PI)a+=2*Math.PI;
while(a>Math.PI)a-=2*Math.PI;
return a;
}

function getNearestAxisIndex(angle){

let best=0;
let bestDiff=Infinity;

for(let i=0;i<totalAxes;i++){

const diff=Math.abs(normalizeAngle(angle-getAxisAngle(i)));

if(diff<bestDiff){
bestDiff=diff;
best=i;
}

}

return best;

}

function createSvg(tag,attrs={}){

const el=document.createElementNS("http://www.w3.org/2000/svg",tag);

Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));

return el;

}

function buildPolygon(){

return values.map((v,i)=>{

const angle=getAxisAngle(i);
const r=(v/10)*maxRadius;
const p=polarToCartesian(angle,r);

return`${p.x},${p.y}`;

}).join(" ");

}

function getLabelConfig(i){

const label=labels[i];

let distance=maxRadius+70;
let dx=0;
let dy=0;
let anchor="middle";

if(label==="Vida Social"){
distance=maxRadius+65;
dx=-8;
anchor="end";
}

if(label==="Amoroso"){
distance=maxRadius+72;
dx=-12;
anchor="end";
}

if(label==="Família"){
distance=maxRadius+75;
dx=-6;
anchor="end";
}

if(label==="Saúde"){
distance=maxRadius+72;
dx=6;
anchor="start";
}

if(label==="Emocional"){
distance=maxRadius+70;
dx=18;
anchor="start";
}

if(label==="Finanças"){
distance=maxRadius+70;
dx=18;
anchor="start";
}

if(label==="Contribuição Social"){
distance=maxRadius+74;
dx=8;
anchor="start";
}

return{distance,dx,dy,anchor};

}

function draw(){

svg.innerHTML="";

for(let l=1;l<=levels;l++){

const r=(l/levels)*maxRadius;
const pts=[];

for(let i=0;i<totalAxes;i++){

const p=polarToCartesian(getAxisAngle(i),r);
pts.push(`${p.x},${p.y}`);

}

svg.appendChild(createSvg("polygon",{points:pts.join(" "),class:"grid"}));

}

for(let i=0;i<totalAxes;i++){

const end=polarToCartesian(getAxisAngle(i),maxRadius);

svg.appendChild(createSvg("line",{
x1:cx,
y1:cy,
x2:end.x,
y2:end.y,
class:"axis"
}));

}

svg.appendChild(createSvg("polygon",{points:buildPolygon(),class:"area"}));

for(let i=0;i<totalAxes;i++){

const angle=getAxisAngle(i);
const r=(values[i]/10)*maxRadius;
const p=polarToCartesian(angle,r);

svg.appendChild(createSvg("circle",{
cx:p.x,
cy:p.y,
r:16,
class:"point"
}));

const bx=p.x+Math.cos(angle)*36;
const by=p.y+Math.sin(angle)*36;

svg.appendChild(createSvg("circle",{
cx:bx,
cy:by,
r:16,
class:"value-badge"
}));

const t=createSvg("text",{x:bx,y:by+1,class:"value-text"});
t.textContent=values[i];
svg.appendChild(t);

}

for(let i=0;i<totalAxes;i++){

const angle=getAxisAngle(i);
const cfg=getLabelConfig(i);
const p=polarToCartesian(angle,cfg.distance);

const txt=createSvg("text",{
x:p.x+cfg.dx,
y:p.y,
class:"label",
"text-anchor":cfg.anchor,
"dominant-baseline":"middle"
});

txt.textContent=labels[i];
svg.appendChild(txt);

}

svg.appendChild(createSvg("circle",{cx:cx,cy:cy,r:4,fill:"#6b7280"}));

}

function getPoint(evt){

const rect=svg.getBoundingClientRect();
const scale=1000/rect.width;

return{
x:(evt.clientX-rect.left)*scale,
y:(evt.clientY-rect.top)*scale
};

}

function update(point){

const dx=point.x-cx;
const dy=point.y-cy;

const angle=Math.atan2(dy,dx);
const dist=Math.sqrt(dx*dx+dy*dy);

const axis=getNearestAxisIndex(angle);

values[axis]=clamp(Math.round((dist/maxRadius)*10),0,10);

draw();

}

function pointerDown(e){

activePointerId=e.pointerId;

update(getPoint(e));

}

function pointerMove(e){

if(e.pointerId!==activePointerId)return;

update(getPoint(e));

}

function pointerUp(e){

activePointerId=null;

}

svg.addEventListener("pointerdown",pointerDown);
svg.addEventListener("pointermove",pointerMove);
svg.addEventListener("pointerup",pointerUp);
svg.addEventListener("pointercancel",pointerUp);

resetBtn.onclick=()=>{
values=new Array(labels.length).fill(10);
draw();
};

draw();

</script>

</body>
</html>
