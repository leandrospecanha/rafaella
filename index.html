<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roda da Vida</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f8;
      color: #1f2937;
    }

    .page {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin: 0 0 6px;
    }

    .subtitulo {
      text-align: center;
      margin: 0 0 12px;
      color: #555;
      font-size: 16px;
      line-height: 1.4;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .grid {
      fill: none;
      stroke: #d1d5db;
      stroke-width: 1.2;
    }

    .axis {
      stroke: #c4cbd4;
      stroke-width: 1.2;
    }

    .area {
      fill: rgba(11, 107, 107, 0.16);
      stroke: #0b6b6b;
      stroke-width: 3;
    }

    .point {
      fill: #0b6b6b;
      stroke: white;
      stroke-width: 3;
    }

    .label {
      font-size: 16px;
      text-anchor: middle;
      font-weight: 700;
      fill: #2f3a45;
    }

    .value-badge {
      fill: #ffffff;
      stroke: #0b6b6b;
      stroke-width: 2;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.18));
    }

    .value-text {
      font-size: 15px;
      text-anchor: middle;
      dominant-baseline: middle;
      fill: #0b6b6b;
      font-weight: 800;
      pointer-events: none;
    }

    .controls {
      text-align: center;
      margin-top: 16px;
    }

    button {
      background: #0b6b6b;
      border: none;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      width: 100%;
      max-width: 400px;
      cursor: pointer;
    }

    .hint {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      .subtitulo {
        font-size: 15px;
      }

      .label {
        font-size: 14px;
      }

      .value-text {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Roda da Vida</h1>
    <p class="subtitulo">Toque no gráfico para ajustar a nota</p>

    <div class="card">
      <svg id="radar" viewBox="0 0 800 800"></svg>

      <div class="controls">
        <button id="resetBtn">Resetar tudo para 10</button>
      </div>

      <div class="hint">
        Toque mais longe do centro para aumentar a nota.
      </div>
    </div>
  </div>

  <script>
    const labels = [
      "Intelectual",
      "Saúde",
      "Emocional",
      "Finanças",
      "Social",
      "Plenitude",
      "Espiritualidade",
      "Vida Social",
      "Amoroso",
      "Família"
    ];

    let values = new Array(labels.length).fill(10);

    const svg = document.getElementById("radar");
    const resetBtn = document.getElementById("resetBtn");

    const cx = 400;
    const cy = 400;
    const maxRadius = 285;
    const levels = 10;
    const totalAxes = labels.length;
    const startAngle = -Math.PI / 2;

    function polarToCartesian(angle, radius) {
      return {
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getAxisAngle(index) {
      return startAngle + (2 * Math.PI * index / totalAxes);
    }

    function normalizeAngle(angle) {
      while (angle < -Math.PI) angle += 2 * Math.PI;
      while (angle > Math.PI) angle -= 2 * Math.PI;
      return angle;
    }

    function getNearestAxisIndex(clickAngle) {
      let nearestIndex = 0;
      let smallestDiff = Infinity;

      for (let i = 0; i < totalAxes; i++) {
        const axisAngle = getAxisAngle(i);
        const diff = Math.abs(normalizeAngle(clickAngle - axisAngle));

        if (diff < smallestDiff) {
          smallestDiff = diff;
          nearestIndex = i;
        }
      }

      return nearestIndex;
    }

    function buildPolygonPoints() {
      return values.map((value, i) => {
        const angle = getAxisAngle(i);
        const radius = (value / 10) * maxRadius;
        const p = polarToCartesian(angle, radius);
        return `${p.x},${p.y}`;
      }).join(" ");
    }

    function createSvgElement(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function drawRadar() {
      svg.innerHTML = "";

      for (let level = 1; level <= levels; level++) {
        const radius = (level / levels) * maxRadius;
        const ringPoints = [];

        for (let i = 0; i < totalAxes; i++) {
          const angle = getAxisAngle(i);
          const p = polarToCartesian(angle, radius);
          ringPoints.push(`${p.x},${p.y}`);
        }

        svg.appendChild(createSvgElement("polygon", {
          points: ringPoints.join(" "),
          class: "grid"
        }));
      }

      for (let i = 0; i < totalAxes; i++) {
        const angle = getAxisAngle(i);
        const end = polarToCartesian(angle, maxRadius);

        svg.appendChild(createSvgElement("line", {
          x1: cx,
          y1: cy,
          x2: end.x,
          y2: end.y,
          class: "axis"
        }));

        const labelPos = polarToCartesian(angle, maxRadius + 72);
        const txt = createSvgElement("text", {
          x: labelPos.x,
          y: labelPos.y,
          class: "label"
        });
        txt.textContent = labels[i];
        svg.appendChild(txt);
      }

      svg.appendChild(createSvgElement("polygon", {
        points: buildPolygonPoints(),
        class: "area"
      }));

      for (let i = 0; i < totalAxes; i++) {
        const angle = getAxisAngle(i);
        const radius = (values[i] / 10) * maxRadius;
        const p = polarToCartesian(angle, radius);

        svg.appendChild(createSvgElement("circle", {
          cx: p.x,
          cy: p.y,
          r: 14,
          class: "point"
        }));

        const badgeDistance = 28;
        const bx = p.x + Math.cos(angle) * badgeDistance;
        const by = p.y + Math.sin(angle) * badgeDistance;

        svg.appendChild(createSvgElement("circle", {
          cx: bx,
          cy: by,
          r: 14,
          class: "value-badge"
        }));

        const valueText = createSvgElement("text", {
          x: bx,
          y: by + 0.5,
          class: "value-text"
        });
        valueText.textContent = values[i];
        svg.appendChild(valueText);
      }

      svg.appendChild(createSvgElement("circle", {
        cx: cx,
        cy: cy,
        r: 4,
        fill: "#6b7280"
      }));
    }

    function getSvgPointFromEvent(event) {
      const rect = svg.getBoundingClientRect();

      const clientX = event.clientX || event.touches[0].clientX;
      const clientY = event.clientY || event.touches[0].clientY;

      const scale = 800 / rect.width;

      return {
        x: (clientX - rect.left) * scale,
        y: (clientY - rect.top) * scale
      };
    }

    function updateByPointer(event) {
      const point = getSvgPointFromEvent(event);

      const dx = point.x - cx;
      const dy = point.y - cy;

      const rawAngle = Math.atan2(dy, dx);
      const distance = Math.sqrt(dx * dx + dy * dy);

      const axisIndex = getNearestAxisIndex(rawAngle);
      const normalizedValue = clamp(Math.round((distance / maxRadius) * 10), 0, 10);

      values[axisIndex] = normalizedValue;
      drawRadar();
    }

    svg.addEventListener("click", updateByPointer);

    svg.addEventListener("touchstart", (event) => {
      event.preventDefault();
      updateByPointer(event);
    }, { passive: false });

    resetBtn.addEventListener("click", () => {
      values = new Array(labels.length).fill(10);
      drawRadar();
    });

    drawRadar();
  </script>
</body>
</html>
